# ClickStack Grafana alerts — contact points
# ----------------------------------------------------------------------------
# Defines WHERE alert notifications are sent. This ships channel-agnostic: the
# default contact point is a generic webhook you point at your own on-call
# integration. This file is ADDITIVE: it adds a contact point named
# "ClickStack Alerts" without touching any contact points you already have.
#
# TO USE:
#   1. Get a webhook URL for the channel you want (a Slack incoming webhook, a
#      Teams Workflow "Post to a channel when a webhook request is received" URL,
#      PagerDuty, Discord, or any HTTP endpoint that accepts a POST).
#   2. Replace the url below with that webhook URL.
#
# Prefer a native integration (email / Slack / PagerDuty)? Comment out the
# webhook receiver and uncomment one of the examples at the bottom (or add your
# own — any Grafana contact point type works). Then point the notification
# policy (notification-policy.yaml) at the receiver name you keep.
apiVersion: 1

contactPoints:
  - orgId: 1
    name: ClickStack Alerts
    receivers:
      - uid: clickstack-alerts
        type: webhook
        disableResolveMessage: false
        settings:
          url: https://REPLACE-WITH-YOUR-WEBHOOK-URL

  # --- Alternative examples (optional) ------------------------------------
  # - orgId: 1
  #   name: ClickStack Email
  #   receivers:
  #     - uid: clickstack-email
  #       type: email
  #       settings:
  #         addresses: oncall@yourcompany.com
